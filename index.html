<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vocab Checker Pro</title>
    <style>
        :root { --primary: #4F46E5; --bg: #F3F4F6; --card: #FFFFFF; --text: #1F2937; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        .container { width: 100%; max-width: 600px; background: var(--card); padding: 35px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .test-container { max-width: 900px; } 
        
        h1 { text-align: center; margin-top: 0; font-size: 36px; color: var(--primary); }
        h2 { text-align: center; font-size: 24px; margin-bottom: 25px; color: #374151;}
        
        .form-group { margin-bottom: 25px; }
        .setting-label { font-size: 20px; font-weight: bold; color: #111827; display: block; margin-bottom: 10px; }
        
        input[type="number"], select, button { padding: 15px; margin: 5px 0; border: 2px solid #E5E7EB; border-radius: 8px; font-size: 20px; width: 100%; box-sizing: border-box; outline: none; transition: 0.2s;}
        input:focus, select:focus { border-color: var(--primary); }
        button { background: var(--primary); color: white; cursor: pointer; border: none; font-weight: bold; transition: 0.2s;}
        button:hover { background: #4338CA; transform: translateY(-2px); }
        
        .total-words-box { text-align: center; font-size: 22px; font-weight: bold; background: #EEF2FF; border: 2px dashed #818CF8; padding: 15px; border-radius: 8px; color: #3730A3; margin-bottom: 30px; }
        
        #test-view-container { display: none; width: 100%; max-width: 900px; }
        .student-turn { font-size: 32px; font-weight: bold; color: var(--primary); margin-bottom: 15px; text-align: center; width: 100%;}
        
        .flashcard { width: 500px; height: 250px; background: #fff; border: 4px dashed var(--primary); border-radius: 20px; display: flex; justify-content: center; align-items: center; font-size: 42px; font-weight: bold; cursor: pointer; user-select: none; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; padding: 20px;}
        .flashcard:hover { transform: scale(1.03); }
        .vi-meaning { display: none; color: #DC2626; font-size: 32px; margin-top: 15px;}
        
        .controls { margin-top: 30px; display: flex; gap: 20px; width: 100%; justify-content: center;}
        .btn-correct { background: #10B981; font-size: 24px; padding: 15px 40px; width: auto; box-shadow: 0 4px 6px rgba(16, 185, 129, 0.3);}
        .btn-wrong { background: #EF4444; font-size: 24px; padding: 15px 40px; width: auto; box-shadow: 0 4px 6px rgba(239, 68, 68, 0.3);}
        .btn-correct:hover { background: #059669; }
        .btn-wrong:hover { background: #DC2626; }
        .btn-skip { background: #F59E0B; font-size: 24px; padding: 15px 40px; width: auto; box-shadow: 0 4px 6px rgba(245, 158, 11, 0.3); border: none; color: white; border-radius: 8px;}
        .btn-skip:hover { background: #D97706; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 20px;}
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #ddd; }
        th { background: var(--primary); color: white; }
        .btn-remove { background: #6B7280; padding: 10px 20px; font-size: 16px; width: auto; border-radius: 6px;}
        .btn-remove:hover { background: #4B5563; }

        /* Checkbox styling */
        .source-container { display: flex; gap: 20px; margin-bottom: 25px; background: #F9FAFB; padding: 15px; border-radius: 8px; border: 1px solid #E5E7EB;}
        .checkbox-container { display: flex; align-items: center; justify-content: flex-start; background: #fff; padding: 15px; border-radius: 8px; border: 2px solid #E5E7EB; margin-bottom: 20px; }
        .custom-cb { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 18px; font-weight: bold; color: #1F2937; }
        .custom-cb input { width: 20px; height: 20px; cursor: pointer; accent-color: var(--primary); }

        /* Nút Sign Out Mới */
.btn-signout { display: none; position: fixed; top: 20px; right: 20px; background: #DC2626; color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; z-index: 1000; font-size: 16px; width: auto; box-shadow: 0 4px 6px rgba(220, 38, 38, 0.3); transition: 0.2s;}
    </style>
</head>
<body>

    <!-- NÚT SIGN OUT TOÀN CỤC (Màu đỏ, góc phải) -->
    <button id="btn-signout" class="btn-signout">Sign Out</button>

    <!-- SCREEN 0: CHỌN VAI TRÒ (Mới) -->
    <div class="container" id="role-view">
        <h1>Vocab Checker Pro</h1>
        <h2>Bạn là giáo viên hay học viên?</h2>
        <div style="display: flex; gap: 20px; justify-content: center; margin-top: 30px;">
            <button id="btn-role-teacher" style="background: #4F46E5; font-size: 20px; padding: 15px 30px;">Giáo viên</button>
            <button id="btn-role-student" style="background: #10B981; font-size: 20px; padding: 15px 30px;">Học viên</button>
        </div>
    </div>

    <!-- SCREEN 1: SETUP -->
    <div class="container" id="setup-view" style="display: none;">
        <h1>Vocab Checker Pro</h1>
        
        <div class="total-words-box">
            System loaded: <span id="total-words-count" style="font-size: 28px; color: #1E1B4B;">0</span> words ready!
        </div>

        <h2>Test Settings</h2>

        <!-- Nguồn từ vựng -->
        <div class="source-container">
            <label class="custom-cb">
                <input type="checkbox" id="src-quizlet" checked> Quizlet Vocab
            </label>
            <label class="custom-cb">
                <input type="checkbox" id="src-homework"> Homework Vocab
            </label>
        </div>
        
        <!-- Menu chọn Bài -->
        <div class="form-group" style="margin-bottom: 15px;">
            <label class="setting-label">Đã học DAY mấy:</label>
            <select id="test-lesson"></select>
        </div>

        <!-- Nút test ONLY (Đã đổi sang tiếng Việt theo yêu cầu) -->
        <div class="checkbox-container">
            <label class="custom-cb" style="width: 100%;">
                <input type="checkbox" id="test-only-current">
                <span id="lbl-only-current">Chỉ kiểm tra bài học này (Không mix bài cũ)</span>
            </label>
        </div>
        
        <!-- Khu vực này sẽ bị ẩn nếu là Học viên -->
        <div class="form-group" id="group-num-students">
            <label class="setting-label">Number of Students:</label>
            <input type="number" id="num-students" value="2" min="1">
        </div>
        
        <div class="form-group">
            <label class="setting-label" id="lbl-words">Số từ vựng muốn kiểm:</label>
            <input type="number" id="words-per-student" value="50" min="1">
        </div>
        
        <button id="btn-start" style="font-size: 26px; padding: 20px; margin-top: 10px; background: #2563EB;">START TESTING</button>
    </div>

    <!-- SCREEN 2: TESTING & DASHBOARD -->
    <div id="test-view-container">
        <div class="container test-container" style="display: flex; flex-direction: column; align-items: center;">
            <div class="student-turn" id="current-student-name">Student 1</div>
            
            <div class="flashcard" id="flashcard">
                <div>
                    <div id="word-en">Word</div>
                    <div id="word-vi" class="vi-meaning">Meaning</div>
                </div>
            </div>

            <div class="controls">
                <button id="btn-correct" class="btn-correct">CORRECT</button>
                <button id="btn-skip" class="btn-skip">SKIP</button>
                <button id="btn-wrong" class="btn-wrong">WRONG</button>
            </div>
        </div>

        <div class="container test-container">
            <h2>Live Progress Dashboard</h2>
            <table>
                <thead>
                    <tr>
                        <th>Student</th>
                        <th>Progress</th>
                        <th>Correct</th>
                        <th>Wrong</th>
                        <th>Accuracy</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="dashboard-body">
                </tbody>
            </table>
            <button id="btn-end" style="margin-top: 30px; background: #374151; font-size: 20px; padding: 15px;">End Test & Go Back</button>
        </div>
    </div>

    <script src="data.js" onerror="console.warn('data.js missing')"></script>
    <script src="script.js"></script>
</body>
</html>
